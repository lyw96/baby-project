<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>저장된 아기 목록</title>
</head>
<body>
    <h2>👶 저장된 아기들</h2>
    <ul>
        {% for baby in babies %}
            <li>
                <a href="/baby/{{ baby.id }}">{{ baby.name }} ({{ baby.birth_date }})</a>
            </li>
        {% endfor %}
    </ul>
    <br>
    <a href="/">➕ 새로 등록하기</a>
</body>
</html>
